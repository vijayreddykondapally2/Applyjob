version: '3.8'

services:
  applyjob-app:
    build: .
    container_name: applyjob_prod
    ports:
      - "5001:5001"
    volumes:
      - applyjob_data:/app/data    # Persist SQLite DB + user data
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY:-your-production-secret-change-me}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

volumes:
  applyjob_data:
    driver: local
